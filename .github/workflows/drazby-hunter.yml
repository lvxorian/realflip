name: Dražby Hunter

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Dražby Hunter
        run: python scripts/drazby_hunter.py
        env:
          OFF_MARKET_API_URL: ${{ secrets.OFF_MARKET_API_URL }}
          OFF_MARKET_API_TOKEN: ${{ secrets.OFF_MARKET_API_TOKEN }}
